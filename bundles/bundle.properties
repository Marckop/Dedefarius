unit.dedefarius-01t-00-ephemeris.description = Core unit: [accent]Entropy[]. Able to [accent]build[] and [accent]repair[] structures with its projectiles.\n\nFires [accent]energy lasers[] that split into [red]heavy shrapnel rounds[] upon impact.