# Planets
planet.dedefarius-dedefarius.name = Dedefarius

# Sectors
sector.dedefarius-20d-00-apperance.name = Apperance
sector.dedefarius-20d-00-apperance.description = You were sent as [accent]reinforcements[] to the planet [#ff9266]Erekir[], but your capsule was [red]damaged[] and you had to make an landing on the nearest celestial body.
sector.dedefarius-15-growth.name = Growth
sector.dedefarius-15-growth.description = Denthrahite Mine, where you research factory and power technologies

# Texts / Dialogue / Objectives
apperance-minesilver1 = [accent]Mine silver[]!

apperance-welcome = welcome to [#4a4358]\uE833 Dedefarius[]!\nSubsector protocols forced an [accent]emergency\n landing[] on the nearest celestial body.\n\n[red]\u26a0 Hostile activity detected on the planet \u26a0[]\n\n[accent]Gather resources[] and \nestablish [accent]\uE817 defenses[] immediately.

apperance-drill = Place [accent]\uE85E 3 Drills[] on [accent]Silver[].

apperance-minesilver2 = Accumulate enough \ue810 [accent]Silver[]\nto establish electricity\nand power infrastructure.

apperance-mineplatinum = Wind turbine components\nalso require \ue85e [accent]Platinum[],\na resource no less critical\nthan \ue810 [accent]Silver[].

apperance-windmill = \ue837 [accent]Note:[] Windmills are highly\nunreliable. Ash and dust\nwill cause them to break down,\nrequiring constant repairs.\n\nPlace 4 Windmills and route\npower to drills using\n[accent]power fluxer node[].

apperance-coremine = Extract \ue810 [accent]Silver[] with drills\nand transport it to the core\nvia \ue814 [accent]cargo pipe[].

apperance-defense = \ue861 [accent]Hostile forces[] approaching!\nEstablish a perimeter with\nturrets and reinforce them\nusing \ue84d [accent]Silver Walls[].\nPrepare for combat!

