item.dedefarius-08c-00-silver.description = Basic construction resource on [#4a4358]Dedefarius[], used everywhere.\n\nAlso functions as [accent]ammunition[].

item.dedefarius-08c-01-platinum.name = Platinum
item.dedefarius-08c-01-platinum.description = ​A secondary resource, second in importance only to [accent]silver[].\n\nUsed extensively in [accent]power generation[].

