# Blocks - Power
block.dedefarius-11o-00-power-fluxer.name = Power Fluxer
block.dedefarius-11o-00-power-fluxer.description = Transports [accent]power[] with a range of 6 blocks, supporting up to 3 [accent]connections[].\n\n[accent]Shares power[] automatically if placed directly adjacent to structures.

block.dedefarius-11o-01-tiny-windmill.name = Tiny Windmill
block.dedefarius-11o-01-tiny-windmill.description = Generates [accent]power[] from the air. Highly unreliable and breaks easily from strong winds, ash, and dust.\n\nRequires regular [accent]repair[] due to rapid wear, and will [red]self-destruct[] after 10 minutes.

# Blocks - Distribution
block.dedefarius-01a-00-cargo-pipe.name = Cargo Pipe
block.dedefarius-01a-00-cargo-pipe.description = Moves [accent]items[] forward. 

block.dedefarius-01a-01-cargo-junction.name = Cargo Junction
block.dedefarius-01a-01-cargo-junction.description = Acts as a [accent]bridge[] for two crossing ducts.

block.dedefarius-01a-02-cargo-router.name = Cargo Router
block.dedefarius-01a-02-cargo-router.description = [accent]Distributes[] items equally in three directions.

block.dedefarius-01a-03-cargo-bridge.name = Cargo Bridge
block.dedefarius-01a-03-cargo-bridge.description = Moves items over [accent]terrain[] or structures.

block.dedefarius-01a-04-cargo-overflow-gate.name = Cargo Overflow Gate
block.dedefarius-01a-04-cargo-overflow-gate.description = Outputs items to the sides only if the front path is [red]blocked[].

# Blocks - Liquid
block.dedefarius-03k-01-culvert.name = Culvert
block.dedefarius-03k-01-culvert.description = Moves [accent]liquids[] forward. Used with pumps and other liquid blocks.

block.dedefarius-03k-02-culvert-junction.name = Culvert Junction
block.dedefarius-03k-02-culvert-junction.description = Acts as a [accent]bridge[] for two crossing liquid conduits.

block.dedefarius-03k-03-culvert-bridge.name = Culvert Bridge
block.dedefarius-03k-03-culvert-bridge.description = Transports liquids over structures or [accent]terrain[].

block.dedefarius-03k-04-culvert-router.name = Culvert Router
block.dedefarius-03k-04-culvert-router.description = Accepts liquids from one direction and [accent]outputs[] them to up to three other directions equally.

