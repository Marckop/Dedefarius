block.dedefarius-06f-01-rotary-drill.description = Бурит [accent]импульсами[]. Малоэффективен против [red]продвинутых руд[].

# Blocks - Turrets
block.dedefarius-13p-00-tract.name = Тракт
block.dedefarius-13p-00-tract.description = Стреляет одиночной пулей по врагам.\n\nАтакует только [accent]наземные цели[].

block.dedefarius-13p-01-carrier.name = Кариер
block.dedefarius-13p-01-carrier.description = Медленная и неповоротливая, быстро стреляет двумя пулями в [accent]маленьком радиусе[].\n\n[red]Неэффективна[] против воздушных целей.

