unit.dedefarius-01t-00-ephemeris.name = Эфемерида
unit.dedefarius-01t-00-ephemeris.description = Юнит ядра: [accent]Энтропия[]. Умеет [accent]строить[] и [accent]чинить[] постройки своими снарядами.\n\nСтреляет [accent]энергетическими лазерами[], которые при попадании распадаются на [red]тяжёлые осколочные патроны[].