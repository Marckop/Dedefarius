# Blocks - Power
block.dedefarius-11o-00-power-fluxer.name = Пауэр флаксер
block.dedefarius-11o-00-power-fluxer.description = Транспортирует [accent]энергию[] с радиусом 6 блоков, имеет всего 3 [accent]подключения[].\n\n[accent]Делится энергией[] автоматически, если стоит вплотную к блокам.

block.dedefarius-11o-01-tiny-windmill.name = Маленький ветряк
block.dedefarius-11o-01-tiny-windmill.description = Генерирует [accent]энергию[] из воздуха. Очень ненадёжный, очень легко ломается от сильного ветра, пепла и пыли.\n\nТребуется регулярно [accent]чинить[], так как он очень быстро ломается, а также через 10 минут он [red]самоуничтожится[].

# Blocks - Distribution
block.dedefarius-01a-00-cargo-pipe.name = Грузовая труба
block.dedefarius-01a-00-cargo-pipe.description = Перемещает [accent]предметы[] вперёд.

block.dedefarius-01a-01-cargo-junction.name = Грузовой перекрёсток
block.dedefarius-01a-01-cargo-junction.description = Служит [accent]мостом[] для двух пересекающихся воздуховодов.

block.dedefarius-01a-02-cargo-router.name = Грузовой маршрутизатор
block.dedefarius-01a-02-cargo-router.description = Равномерно [accent]распределяет[] предметы по трём направлениям.

block.dedefarius-01a-03-cargo-bridge.name = Грузовой мост
block.dedefarius-01a-03-cargo-bridge.description = Перемещает предметы через [accent]ландшафт[] или постройки.

block.dedefarius-01a-04-cargo-overflow-gate.name = Избыточный грузовой шлюз
block.dedefarius-01a-04-cargo-overflow-gate.description = Выдаёт предметы в боковые стороны только в том случае, если путь впереди [red]заблокирован[].

# Blocks - Liquid
block.dedefarius-03k-01-culvert.name = Водовод
block.dedefarius-03k-01-culvert.description = Перемещает [accent]жидкости[] вперёд. Используется с насосами и другими жидкостными блоками.

block.dedefarius-03k-02-culvert-junction.name = Перекрёсток водоводов
block.dedefarius-03k-02-culvert-junction.description = Служит [accent]мостом[] для двух пересекающихся жидкостных трубопроводов.

block.dedefarius-03k-03-culvert-bridge.name = Мостовой водовод
block.dedefarius-03k-03-culvert-bridge.description = Транспортирует жидкости через постройки или [accent]ландшафт[].

block.dedefarius-03k-04-culvert-router.name = Маршрутизатор водоводов
block.dedefarius-03k-04-culvert-router.description = Принимает жидкости с одного направления и поровну [accent]распределяет[] их максимум на три других направления.

