# Planets
planet.dedefarius-dedefarius.name = Дедефарис

# Sectors
sector.dedefarius-20d-00-apperance.name = Появление
sector.dedefarius-20d-00-apperance.description = Вы были отправлены в качестве [accent]подкрепления[] на планету [#ff9266]Эрекир[], но ваша капсула была [red]повреждена[], и вам пришлось совершить аварийную посадку на ближайшее небесное тело.
sector.dedefarius-15-growth.name = Рост
sector.dedefarius-15-growth.description = Шахта Дентрахита, где вы исследуете заводские и энергетические технологии.

# Texts / Dialogue / Objectives
apperance-minesilver1 = [accent]Добудьте серебро[]!

apperance-welcome = Добро пожаловать на [#4a4358]\uE833 Дедефариус[]!\nПротоколы подсектора вызвали [accent]аварийную\n посадку[] на ближайшее небесное тело.\n\n[red]\u26a0 На планете обнаружена вражеская активность \u26a0[]\n\n[accent]Соберите ресурсы[] и \nнемедленно организуйте [accent]\uE817 защиту[].

apperance-drill = Разместите [accent]\uE85E 3 бура[] на [accent]серебре[].

apperance-minesilver2 = Накопите достаточно \ue810 [accent]серебра[],\nчтобы провести электричество\nи создать энергоинфраструктуру.

apperance-mineplatinum = Для компонентов ветрогенератора\nтакже требуется \ue85e [accent]платина[],\nресурс не менее важный,\nчем \ue810 [accent]серебро[].

apperance-windmill = \ue837 [accent]Примечание:[] Ветряки крайне\nненадёжны. Пепел и пыль\nприведут к их поломке,\nтребуя постоянного ремонта.\n\nПоставьте 4 ветряка и подведите\nэнергию к бурам с помощью\n[accent]узла передачи энергии[].

apperance-coremine = Добудьте \ue810 [accent]серебро[] бурами\nи транспортируйте его в ядро\nчерез [accent]\ue814 грузовую трубу[].

apperance-defense = \ue861 [accent]Вражеские силы[] приближаются!\nСоздайте периметр из\nтурелей и укрепите их\nс помощью [accent]\ue84d серебряных стен[].\nГотовьтесь к бою!

# Items
item.dedefarius-08c-00-silver.name = Серебро
item.dedefarius-08c-00-silver.description = Начальный строительный ресурс на [#4a4358]Дедефарисе[], используется повсеместно.\n\nТакже используется как [accent]патрон[].

item.dedefarius-08c-01-platinum.name = Платина
item.dedefarius-08c-01-platinum.description = Побочный ресурс, второй по важности после [accent]серебра[].\n\nИспользуется в [accent]энергетике[].

